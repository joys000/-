name: Market Intelligence Suite

on:
  schedule:
    - cron: '0 23 * * *' # 한국 시간 오전 8시 (매일 실행)
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests lxml html5lib beautifulsoup4

      - name: Run Economic Calendar
        env:
          CALENDAR_WEBHOOK: ${{ secrets.CALENDAR_WEBHOOK }}
        run: python economic_calendar.py

      - name: Run Whale Tracker
        env:
          WHALE_WEBHOOK: ${{ secrets.WHALE_WEBHOOK }}
        run: python whale_tracker.py
