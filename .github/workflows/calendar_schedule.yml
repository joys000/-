name: Daily Economic Calendar

on:
  schedule:
    - cron: '0 23 * * *' # 한국 시간 오전 8시
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Calendar
        env:
          CALENDAR_WEBHOOK: ${{ secrets.CALENDAR_WEBHOOK }}
        run: python economic_calendar.py
        # 티커
      - name: Run Whale Tracker
        env:
          WHALE_WEBHOOK: ${{ secrets.WHALE_WEBHOOK }}
        run: python whale_tracker.py
